Name: # Name of the data set in four languages
  de: Schweizerischer Landesverbrauch Energie
  en: Swiss national energy consumption
  fr: 
  it: 
Description: # a description of the data set in four languages
  de: Die Schweizerische Elektrizitätsbilanz - Monatswerte gibt Auskunft über Produktion, Import / Export und Verbrauch von Elektrizität in der Schweiz auf monatlicher Basis. Bei der Produktion werden Wasserkraftwerke, Kernkraftwerke konventionell-thermische und erneuerbare Kraftwerke unterschieden.Die Produktion der thermischen Kraftwerke, der Windkraft- und Photovoltaikanlagen wird seit dem Jahr 2020 neu separat ausgewiesen. Der Verbrauch der Speicherpumpen und die Leitungsverluste werden ebenfalls ausgewiesen. Die monatliche Elektrizitätsbilanz wird im Rahmen der Elektrizitätsstatistik erstellt, welche Teil der öffentlichen Statistik der Schweiz ist (gesetzliche Grundlage BStatG).
  fr: Cette statistique recense sur une base mensuelle la production, l'importation, l'exportation et la consommation d'électricité en Suisse. Elle présente la production des centrales hydrauliques, des centrales nucléaires, des centrales thermiques classiques et renouvelables. Elle indique la consommation des installations de pompage d'accumulation et les pertes en ligne. Elle est établie dans le cadre de la Statistique de l'électricité, qui fait partie de la statistique publique de la Suisse (base légale LSF).
  it: Il bilancio mensile svizzero dell'elettricità fornisce informazioni sulla produzione, l’importazione, l’esportazione e il consumo di elettricità in Svizzera su base mensile. Per quanto riguarda la produzione, si distingue tra centrali idroelettriche, centrali nucleari, centrali termiche convenzionali e centrali rinnovabili. Vengono riportati il consumo delle pompe di accumulo e le perdite di linea.Il bilancio mensile dell'elettricità viene redatto nell'ambito della statistica dell'energia elettrica, che fa parte della statistica pubblica della Svizzera (base legale LStat).
